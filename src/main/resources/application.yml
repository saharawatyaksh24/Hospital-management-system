server:
  port: 8080

spring:
  application:
    name: hospital-management-system

  # ---- MySQL connection ----
  # Update username/password to match your local MySQL setup.
  # If you'd rather use PostgreSQL instead, swap the driver in pom.xml
  # to org.postgresql:postgresql and change url/driver-class-name below.
  datasource:
    url: jdbc:mysql://localhost:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: Yaksh353563
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # update = auto-create/alter tables from your entities while you're
      # actively building. Switch to validate once your schema stabilizes.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework: INFO
    com.hms: DEBUG
